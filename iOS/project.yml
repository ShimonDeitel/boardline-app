name: Boardline
options:
  bundleIdPrefix: com.shimondeitel.boardlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Boardline:
    type: application
    platform: iOS
    sources:
      - path: Boardline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.boardlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Boardline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BoardlineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BoardlineTests
      - path: Boardline.storekit
    dependencies:
      - target: Boardline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.boardlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BoardlineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BoardlineUITests
    dependencies:
      - target: Boardline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.boardlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Boardline:
    build:
      targets:
        Boardline: all
        BoardlineTests: [test]
        BoardlineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Boardline.storekit
    test:
      config: Debug
      storeKitConfiguration: Boardline.storekit
      targets:
        - BoardlineTests
        - BoardlineUITests
    archive:
      config: Release
